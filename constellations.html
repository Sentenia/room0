<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellations of Nothing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Sometype+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #030306;
    overflow: hidden;
    cursor: crosshair;
    user-select: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  #star-count {
    font-family: 'Sometype Mono', monospace;
    font-size: 10px;
    color: rgba(196, 149, 106, 0.3);
    letter-spacing: 3px;
  }

  #hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: rgba(200, 192, 180, 0.2);
    margin-top: 8px;
    font-style: italic;
    transition: opacity 3s;
  }

  #title-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    animation: title-life 6s ease forwards;
  }

  #title-overlay h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(200, 192, 180, 0.6);
    margin-bottom: 12px;
  }

  #title-overlay p {
    font-family: 'Sometype Mono', monospace;
    font-size: 10px;
    color: rgba(200, 192, 180, 0.25);
    letter-spacing: 3px;
  }

  @keyframes title-life {
    0% { opacity: 0; }
    20% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Seed display */
  #seed {
    position: fixed;
    top: 20px;
    right: 20px;
    font-family: 'Sometype Mono', monospace;
    font-size: 9px;
    color: rgba(90, 86, 79, 0.3);
    letter-spacing: 2px;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="title-overlay">
  <h1>CONSTELLATIONS OF NOTHING</h1>
  <p>CLICK TO CREATE &mdash; MOVE TO INFLUENCE</p>
</div>

<div id="seed"></div>

<canvas id="sky"></canvas>

<div id="ui">
  <div id="star-count">STARS: 0</div>
  <div id="hint">click anywhere to birth a star</div>
</div>

<script>
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');

  // Unique seed for this universe
  const seed = Math.floor(Math.random() * 999999).toString().padStart(6, '0');
  document.getElementById('seed').textContent = 'UNIVERSE #' + seed;

  // Seeded random
  let rngState = parseInt(seed);
  function seededRandom() {
    rngState = (rngState * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (rngState >>> 0) / 0xFFFFFFFF;
  }

  let W, H, dpr;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  // ========== STARS ==========
  const stars = [];
  const constellationLines = [];
  const trails = [];
  let mouseX = W / 2, mouseY = H / 2;
  let mouseActive = false;
  let hintShown = true;
  let totalBorn = 0;
  let epoch = 0;

  // Color palettes that shift over time
  const palettes = [
    ['#c4956a', '#d4a574', '#e8c89e', '#f0d8b4'],  // amber
    ['#6a8fc4', '#7aa4d4', '#8eb8e4', '#a4cef0'],  // blue
    ['#c47a7a', '#d48a8a', '#e49a9a', '#f0aaaa'],  // rose
    ['#7ac49a', '#8ad4aa', '#9ae4ba', '#aaf0ca'],  // sage
    ['#c4b46a', '#d4c47a', '#e4d48a', '#f0e49a'],  // gold
  ];

  function getColor() {
    const paletteIdx = Math.floor(epoch / 20) % palettes.length;
    const p = palettes[paletteIdx];
    return p[Math.floor(Math.random() * p.length)];
  }

  function birthStar(x, y, burst = false) {
    const count = burst ? 3 + Math.floor(Math.random() * 4) : 1;
    for (let i = 0; i < count; i++) {
      const angle = burst ? (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.5 : Math.random() * Math.PI * 2;
      const speed = burst ? 0.3 + Math.random() * 0.8 : 0.05 + Math.random() * 0.15;
      const star = {
        x: x + (burst ? (Math.random() - 0.5) * 20 : 0),
        y: y + (burst ? (Math.random() - 0.5) * 20 : 0),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 0.8 + Math.random() * 2.5,
        color: getColor(),
        alpha: 0,
        targetAlpha: 0.4 + Math.random() * 0.5,
        life: 1,
        decay: 0.0001 + Math.random() * 0.0003,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 0.02 + Math.random() * 0.03,
        born: Date.now(),
        trail: [],
      };
      stars.push(star);
      totalBorn++;
      epoch = totalBorn;
    }
    updateCount();
  }

  function updateCount() {
    document.getElementById('star-count').textContent = 'STARS: ' + stars.length;
  }

  // ========== BACKGROUND STARS (static) ==========
  const bgStars = [];
  for (let i = 0; i < 200; i++) {
    bgStars.push({
      x: seededRandom() * 2000,
      y: seededRandom() * 2000,
      r: seededRandom() * 1.2,
      a: seededRandom() * 0.3,
      twinkle: seededRandom() * Math.PI * 2,
    });
  }

  // ========== CONSTELLATION LOGIC ==========
  function updateConstellations() {
    constellationLines.length = 0;
    const maxDist = 120;
    for (let i = 0; i < stars.length; i++) {
      let nearest = null;
      let nearestDist = maxDist;
      for (let j = i + 1; j < stars.length; j++) {
        const dx = stars[i].x - stars[j].x;
        const dy = stars[i].y - stars[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < nearestDist) {
          nearest = j;
          nearestDist = d;
        }
      }
      if (nearest !== null) {
        constellationLines.push({
          x1: stars[i].x, y1: stars[i].y,
          x2: stars[nearest].x, y2: stars[nearest].y,
          alpha: Math.max(0, 0.15 * (1 - nearestDist / maxDist)) * Math.min(stars[i].alpha, stars[nearest].alpha),
          color: stars[i].color,
        });
      }
    }
  }

  // ========== UPDATE ==========
  function update() {
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];

      // Fade in
      if (s.alpha < s.targetAlpha) s.alpha = Math.min(s.alpha + 0.008, s.targetAlpha);

      // Gravity from mouse
      if (mouseActive) {
        const dx = mouseX - s.x;
        const dy = mouseY - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 10 && dist < 300) {
          const force = 0.02 / (dist * 0.05);
          s.vx += (dx / dist) * force;
          s.vy += (dy / dist) * force;
        }
      }

      // Drift
      s.x += s.vx;
      s.y += s.vy;

      // Gentle friction
      s.vx *= 0.999;
      s.vy *= 0.999;

      // Wrap
      if (s.x < -20) s.x = W + 20;
      if (s.x > W + 20) s.x = -20;
      if (s.y < -20) s.y = H + 20;
      if (s.y > H + 20) s.y = -20;

      // Twinkle
      s.twinklePhase += s.twinkleSpeed;

      // Trail
      if (Math.abs(s.vx) + Math.abs(s.vy) > 0.15) {
        s.trail.push({ x: s.x, y: s.y, a: s.alpha * 0.3 });
        if (s.trail.length > 20) s.trail.shift();
      } else if (s.trail.length > 0) {
        s.trail.shift();
      }

      // Decay
      s.life -= s.decay;
      if (s.life <= 0) {
        // Death burst
        trails.push({ x: s.x, y: s.y, r: s.radius * 3, a: 0.4, color: s.color });
        stars.splice(i, 1);
      }
    }

    // Fade trails
    for (let i = trails.length - 1; i >= 0; i--) {
      trails[i].a -= 0.008;
      trails[i].r += 0.3;
      if (trails[i].a <= 0) trails.splice(i, 1);
    }

    if (stars.length > 0 && Math.random() < 0.1) updateConstellations();
  }

  // ========== DRAW ==========
  function draw() {
    // Clear with slight persistence for trail effect
    ctx.fillStyle = 'rgba(3, 3, 6, 0.15)';
    ctx.fillRect(0, 0, W, H);

    // Background stars
    const t = Date.now() * 0.001;
    bgStars.forEach(s => {
      const twinkle = 0.5 + 0.5 * Math.sin(t * 0.5 + s.twinkle);
      ctx.fillStyle = `rgba(200, 192, 180, ${s.a * twinkle})`;
      ctx.fillRect(s.x % W, s.y % H, s.r, s.r);
    });

    // Death trails
    trails.forEach(tr => {
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, tr.r, 0, Math.PI * 2);
      ctx.fillStyle = tr.color.replace(')', `, ${tr.a * 0.3})`).replace('rgb', 'rgba');
      // Simpler approach
      ctx.globalAlpha = tr.a * 0.3;
      ctx.fillStyle = tr.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Constellation lines
    constellationLines.forEach(l => {
      ctx.beginPath();
      ctx.moveTo(l.x1, l.y1);
      ctx.lineTo(l.x2, l.y2);
      ctx.strokeStyle = l.color;
      ctx.globalAlpha = l.alpha;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    // Stars
    stars.forEach(s => {
      const twinkle = 0.7 + 0.3 * Math.sin(s.twinklePhase);
      const a = s.alpha * twinkle * s.life;

      // Motion trail
      if (s.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(s.trail[0].x, s.trail[0].y);
        for (let i = 1; i < s.trail.length; i++) {
          ctx.lineTo(s.trail[i].x, s.trail[i].y);
        }
        ctx.strokeStyle = s.color;
        ctx.globalAlpha = a * 0.15;
        ctx.lineWidth = s.radius * 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Glow
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * 4, 0, Math.PI * 2);
      ctx.globalAlpha = a * 0.08;
      ctx.fillStyle = s.color;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.fill();

      // Hot center
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * 0.4, 0, Math.PI * 2);
      ctx.globalAlpha = a * 0.8;
      ctx.fillStyle = '#fff';
      ctx.fill();

      ctx.globalAlpha = 1;
    });

    // Mouse gravity well indicator
    if (mouseActive) {
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(196, 149, 106, 0.2)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 30, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(196, 149, 106, 0.05)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // ========== LOOP ==========
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();

  // ========== INPUT ==========
  canvas.addEventListener('click', e => {
    birthStar(e.clientX, e.clientY, e.shiftKey);
    if (hintShown) {
      document.getElementById('hint').style.opacity = '0';
      hintShown = false;
    }
  });

  canvas.addEventListener('dblclick', e => {
    birthStar(e.clientX, e.clientY, true);
  });

  canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseActive = true;
  });

  canvas.addEventListener('mouseleave', () => {
    mouseActive = false;
  });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    birthStar(touch.clientX, touch.clientY, false);
    mouseX = touch.clientX;
    mouseY = touch.clientY;
    mouseActive = true;
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    mouseX = touch.clientX;
    mouseY = touch.clientY;
  });

  canvas.addEventListener('touchend', () => {
    mouseActive = false;
  });

  // Spawn some initial stars based on seed
  setTimeout(() => {
    for (let i = 0; i < 5; i++) {
      birthStar(
        W * 0.3 + seededRandom() * W * 0.4,
        H * 0.3 + seededRandom() * H * 0.4
      );
    }
  }, 2000);
</script>
</body>
</html>
